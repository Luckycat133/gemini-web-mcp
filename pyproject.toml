[project]
name = "gemini-mcp-server"
version = "2.0.0"
description = "MCP server for Gemini Web API reverse engineering (v2.0)"
requires-python = ">=3.10"
readme = "README.md"
license = {text = "AGPL-3.0"}
authors = [
    {name = "Gemini MCP Server Contributors"}
]
dependencies = [
    "gemini-webapi>=1.20.0",
    "mcp>=1.0.0",
    "fastmcp>=1.0.0",
]
dynamic = ["classifiers"]

[project.optional-dependencies]
browser = ["browser-cookie3>=0.19.0"]
image = ["pillow>=10.0.0"]
all = ["browser-cookie3>=0.19.0", "pillow>=10.0.0"]

[project.scripts]
gemini-mcp-server = "src.server:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "file"
path = "src/__init__.py"

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
